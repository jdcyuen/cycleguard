# =========================
# CRASH DEPLOYMENT SYSTEM
# =========================
deployment:
  levels:
    Level 1: 0.03   # -10%
    Level 2: 0.05   # -20%
    Level 3: 0.08   # -30%
    Level 4: 0.09   # -40%


# =========================
# BUY STRATEGY
# =========================
buy_targets:
  Level 1:
    FZROX: 0.60
    SCHD: 0.25
    SCHG: 0.15

  Level 2:
    FZROX: 0.50
    SCHG: 0.20
    SCHD: 0.20
    SMH: 0.10

  Level 3:
    FZROX: 0.40
    SCHG: 0.25
    SMH: 0.20
    STOCKS: 0.15

  Level 4:
    FZROX: 0.35
    SCHG: 0.30
    SMH: 0.25
    STOCKS: 0.10


# =========================
# FUNDING (SELL ORDER)
# =========================
funding:
  priority:
    - SGOV
    - FDRXX
    - VUSB
    - BINC
    - FXNAX


# =========================
# POSITION LIMITS
# =========================
limits:
  max_position_pct: 0.10

  overrides:
    NVDA: 0.08
    SMH: 0.15
    FZROX: 0.20

  stock_bucket:
    - AAPL
    - NVDA
    - GOOG


# =========================
# RECOVERY SYSTEM
# =========================
recovery:
  rebound_threshold: 0.20   # Trigger at +20% from bottom

  trim_targets:
    SMH: 0.20
    SCHG: 0.15

  rebuild_cash_to: SGOV


# =========================
# REGIME SYSTEM
# =========================
regime_system:
  signals:
    trend:
      proxy: "SPY"
    breadth:
      proxy: "SP500_50DMA_PCT"
      thresholds:
        strong: 65
        weak: 50
    volatility:
      proxy: "^VIX"
      thresholds:
        calm: 18
        risk_off: 25
    leadership:
      proxies: ["SMH", "QQQ"]
    credit:
      proxies: ["JNK", "SHY"]

  regimes:
    - name: "RISK_ON"
      description: "Aggressive growth allocation."
    - name: "TRANSITION"
      description: "Neutral/shifting allocation."
    - name: "DEFENSIVE"
      description: "Capital preservation allocation."


# =========================
# SYSTEM FILE PATHS
# =========================
system:
  files:
    portfolio: "src/data/portfolio_state.json"
    rebalance: "src/data/rebalance_state.json"
    recovery: "src/data/recovery_state.json"
    trades: "src/data/trade_log.csv"